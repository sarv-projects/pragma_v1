name: Pragma CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./... -timeout 120s

  python:
    name: Python (daemon)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install daemon (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e './daemon[dev]'
      - name: Ruff lint
        run: ruff check daemon/pragma_daemon
      - name: Pytest
        run: PYTHONPATH=daemon pytest daemon/tests/ -q

  smoke:
    name: Cross-process smoke (end-to-end daemon call)
    runs-on: ubuntu-24.04
    needs: [go, python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up venv with daemon
        run: |
          python -m venv .venv
          .venv/bin/pip install -q --upgrade pip
          .venv/bin/pip install -q -e ./daemon
      - name: Build smoke binary
        run: go build -o pragma-smoke ./cmd/pragma-smoke
      - name: Run smoke test (starts daemon, pings over UDS)
        env:
          PRAGMA_PYTHON: ${{ github.workspace }}/.venv/bin/python
          GROQ_API_KEY: smoke-dummy-key
          DEEPSEEK_API_KEY: smoke-dummy-key
        run: ./pragma-smoke
