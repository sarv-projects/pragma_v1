[meta]
name = "Go Fiber + sqlc"
language = "go"
version = "1.22"
description = "Go REST API with Fiber v3, sqlc for type-safe SQL, and pgx"
beginner_label = "Go + PostgreSQL"

[framework]
name = "fiber"
version = "3"

[database]
query_gen = "sqlc"
driver = "pgx"
migrations = "golang-migrate"

[frontend]
enabled = true
framework = "react"
bundler = "vite"
language = "typescript"
description = "Vite + React + TypeScript SPA (generated in frontend/)"

[testing]
framework = "testing"
tools = ["testify", "httptest"]
coverage = "go test -cover"

[deployment]
dockerfile = true
compose = true
base_image = "golang:1.22-alpine"
final_image = "alpine:3.19"

[patterns]
context = """
FRAMEWORK PATTERNS:
- OpenAPI: use swaggo/swag (github.com/swaggo/swag) for generating OpenAPI spec from Go comments
- Add @title, @version, @host annotations in a comment block before the main function
- Annotate handler functions with @Summary, @Description, @Tags, @Param, @Success, @Failure, @Router
- Serve swagger JSON via swagger embed (github.com/gofiber/contrib/swagger) or a static /swagger.json endpoint
- Fiber handlers: func(c fiber.Ctx) error — always return error, never panic
- Route groups: app.Group("/api/v1") with middleware chaining
- Middleware order: recover → logger → cors → rateLimit → auth → routes
- Request parsing: c.BodyParser(&struct) with validation tags
- Response: c.JSON(fiber.Map{}) or c.Status(201).JSON(response)
- Error handling: custom error handler in app config, fiber.NewError() for HTTP errors
- sqlc: write SQL in query/ directory, generate Go code with sqlc generate
- Connection pool: pgxpool.Pool as singleton, passed via dependency injection
- File structure: cmd/api/, internal/handler/, internal/service/, internal/repository/, db/query/, db/migrations/
- Config: use envconfig or viper, loaded at startup, passed as struct
- Graceful shutdown: signal.NotifyContext + app.ShutdownWithContext
"""

[engineering]
context = """
GO BEST PRACTICES:
- Exported functions have doc comments (golint enforced)
- Accept interfaces, return structs
- Error handling: always check errors, wrap with fmt.Errorf("context: %w", err)
- No naked returns (always explicit return values)
- Use context.Context as first param for any function that does I/O
- Dependency injection: pass dependencies as struct fields, not globals
- Package layout: cmd/ for entrypoints, internal/ for private packages
- No init() functions (explicit initialization in main)
- Table-driven tests: []struct{name, input, want} pattern
- Use testify/assert for test assertions (not manual if/t.Fatal)
- Errors are values: define sentinel errors (var ErrNotFound = errors.New(...))
- No magic numbers: define constants with descriptive names
- Max function length: ~40 lines (extract helpers)
- Use struct embedding for interface composition, not inheritance
- Channels: prefer sync.Mutex for simple state, channels for communication
- Use golangci-lint with strict config
"""

[security]
context = """
SECURITY PRACTICES:
- Auth: JWT with RS256 or HS256, validate on every protected route
- Passwords: bcrypt (golang.org/x/crypto/bcrypt), cost 12
- Input validation: validate struct tags, reject early
- SQL injection: sqlc generates parameterised queries (never string concat SQL)
- CORS: explicit AllowOrigins list in fiber middleware. For OAuth callbacks, add provider domains (e.g., https://accounts.google.com)
- Rate limiting: fiber/middleware/limiter on auth endpoints
- Secrets: from environment, never in code or config files committed to git
- TLS: terminated at load balancer, or use fiber.ListenTLS in prod
- Timeouts: set ReadTimeout, WriteTimeout, IdleTimeout on fiber.Config
- No sensitive data in logs: redact tokens, passwords, PII
- Dockerfile: multi-stage build, final image has no Go toolchain, run as non-root
- OAuth: Use github.com/go-oauth2/oauth2 for OAuth2 flows. For Google: golang.org/x/oauth2/google. For GitHub: golang.org/x/oauth2/github. Store client secrets in env vars. Use state parameter for CSRF protection. Implement PKCE for web apps. Redirect to https callback URLs in production.
- Session auth: For cookie-based auth, use github.com/gorilla/sessions with secure, httpOnly flags. Use fiber/middleware/session for fiber-native session management.
"""

[linter]
tool = "golangci-lint"
config = "errcheck, gosec, govet, staticcheck, unused"

[conformance_rules]
require_error_handling = true
require_context_param = true
require_doc_comments = true
ban_naked_returns = true
